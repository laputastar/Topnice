name: Fetch & Deploy Data

on:
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours
  workflow_dispatch:        # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      LONG_CAT_API_KEY: ${{ secrets.LONG_CAT_API_KEY }}
      AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openai

      - name: Fetch Kickstarter API
        run: python scripts/fetch-kickstarter.py

      - name: Fetch Indiegogo API
        run: python scripts/fetch-indiegogo.py

      - name: Merge data + score + snapshot
        run: python scripts/merge.py

      - name: Fetch HTML (new projects only)
        run: python scripts/fetch-html.py

      - name: AI extract fields
        run: python scripts/ai-extract.py

      - name: Validate AI data
        run: python scripts/validate-ai-data.py

      - name: Translate new content (Cloudflare AI)
        run: |
          python scripts/translate_zh.py extract
          for f in scripts/translations/batch_*.jsonl; do
            [ -f "$f" ] || continue
            [[ "$f" != *_zh.jsonl ]] || continue
            python scripts/cf-translate.py "$f"
          done
          python scripts/translate_zh.py apply
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: auto-update projects.json [skip actions]"
            git push
          fi
