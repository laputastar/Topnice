name: Translate Only

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  translate-only:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      CONTEXT_DEV_API_KEY: ${{ secrets.CONTEXT_DEV_API_KEY }}
      LONG_CAT_API_KEY: ${{ secrets.LONG_CAT_API_KEY }}
      AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openai

      - name: Translate new content (Qwen3 via Cloudflare Workers AI)
        run: |
          python scripts/translate_zh.py extract
          for f in scripts/translations/batch_*.jsonl; do
            [ -f "$f" ] || continue
            [[ "$f" != *_zh.jsonl ]] || continue
            python scripts/cf-translate.py "$f"
          done
          python scripts/translate_zh.py apply

      - name: Commit and push translations
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json
          if git diff --staged --quiet; then
            echo "No translation changes to commit"
          else
            git commit -m "data: translate content (Qwen3) [skip actions]"
            git push
          fi
